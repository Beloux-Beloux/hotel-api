services:
  - type: web
    name: hotel-api
    env: php
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      cp .env.example .env
      php artisan key:generate
    startCommand: ./start.sh
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: DB_HOST
        fromDatabase:
          name: hotel-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: hotel-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: hotel-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: hotel-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: hotel-db
          property: password

databases:
  - name: hotel-db
    plan: free
    databaseName: hotel
    ipAllowList: []